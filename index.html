<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pythonwebapp1</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
    }

    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem auto;
      box-shadow: 0 4px 20px rgba(56, 139, 253, 0.3);
    }

    .icon svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }

    .project-name {
      font-size: 2rem;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .project-name span {
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      margin: 1.5rem auto;
      border-radius: 2px;
    }

    .repo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      margin-top: 0.5rem;
      cursor: default;
      transition: border-color 0.2s ease;
    }

    .repo-section:hover {
      border-color: #58a6ff;
    }

    .repo-section svg {
      width: 18px;
      height: 18px;
      fill: #8b949e;
      flex-shrink: 0;
    }

    .repo-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-right: 0.25rem;
    }

    .repo-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #58a6ff;
      font-family: 'Courier New', monospace;
    }

    .description {
      font-size: 0.92rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 1.5rem 2rem;
      border-top: 1px solid #21262d;
      background-color: #0d1117;
    }

    .footer-text {
      font-size: 0.82rem;
      color: #8b949e;
      letter-spacing: 0.03em;
    }

    .footer-text strong {
      color: #bc8cff;
      font-weight: 600;
    }

    .footer-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #bc8cff;
      border-radius: 50%;
      margin: 0 0.5rem;
      vertical-align: middle;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .project-name {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">&#x2728; Live Project</div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                   10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4
                   0h-2V8h2v8z"/>
        </svg>
      </div>

      <h1 class="project-name">
        <span>pythonwebapp1</span>
      </h1>

      <p class="description">
        A modern Python web application — built for performance,
        scalability, and clean developer experience.
      </p>

      <div class="repo-section">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1
                   .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75
                   0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714
                   1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1
                   2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486
                   2.486 0 0 1 4.5 9h8V1.5Z"/>
        </svg>
        <span class="repo-label">Repo</span>
        <span class="repo-name">Pythonwebapp1</span>
      </div>

      <div class="divider"></div>
    </div>
  </div>

  <footer>
    <p class="footer-text">
      &copy; 2024
      <span class="footer-dot"></span>
      Developed by <strong>Royal Bengal AI</strong>
      <span class="footer-dot"></span>
      All rights reserved
    </p>
  </footer>

</body>
</html>
